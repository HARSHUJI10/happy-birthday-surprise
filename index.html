<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday My Love ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Poppins:wght@400;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'Poppins',sans-serif;
background:linear-gradient(135deg,#ff9a9e,#fecfef);
height:100vh;
display:flex;
align-items:center;
justify-content:center;
overflow:hidden;
}

.card{
background:white;
padding:30px;
border-radius:25px;
width:450px;
max-width:90%;
text-align:center;
box-shadow:0 15px 35px rgba(0,0,0,0.2);
position:relative;
z-index:10;
}

h1{
font-family:'Dancing Script',cursive;
font-size:45px;
color:#c9184a;
margin-bottom:10px;
}

.message{
font-size:18px;
margin:15px 0;
min-height:80px;
}

.btn{
padding:12px 25px;
border:none;
border-radius:40px;
font-size:16px;
cursor:pointer;
font-weight:600;
margin:10px;
}

.btn-primary{
background:#ff4d6d;
color:white;
}

.btn-secondary{
background:white;
border:2px solid #ff4d6d;
color:#ff4d6d;
}

.round-btn{
width:80px;
height:80px;
border-radius:50%;
}

.top-gif{
width:140px;
border-radius:15px;
margin-bottom:10px;
}

.cute-gif{
width:200px;
border-radius:15px;
margin-bottom:15px;
}

#no-gif{
display:none;
width:140px;
margin-top:10px;
}

.screen{
display:none;
}

.screen.active{
display:block;
}

#music-start-btn{
position:fixed;
bottom:20px;
right:20px;
background:#ff4d6d;
color:white;
border:none;
padding:10px 15px;
border-radius:30px;
cursor:pointer;
display:none;
}

</style>
</head>

<body>

<audio id="bg-music" loop>
<source src="./palat1.mp3" type="audio/mpeg">
</audio>

<button id="music-start-btn">Tap for Music 🎵</button>

<div class="card">

<!-- SCREEN 1 -->
<div class="screen active" id="screen1">

<img src="./happy-birthday.gif" class="top-gif">

<h1>Happy Birthday<br>My Love 💖</h1>

<p class="message" id="typing-text"></p>

<button class="btn btn-primary" id="next-btn" style="display:none;" onclick="showScreen('screen2')">
Next 💝
</button>

</div>

<!-- SCREEN 2 -->

<div class="screen" id="screen2">

<img src="./bubu-dudu-kisses.gif" class="top-gif">

<h1>One more thing...</h1>

<p class="message">
Can you go on a date with me? 💖
</p>

<div>

<button class="btn btn-primary" id="yes-btn">Yes 💘</button>

<button class="btn btn-secondary round-btn" id="no-btn">No 🥺</button>

</div>

<img id="no-gif" src="./not-for-you-im-sorry.gif">

</div>

<!-- SCREEN 3 -->

<div class="screen" id="screen3">

<img src="./cute-cat-couple.gif" class="cute-gif">

<h1>Yayyy 💕</h1>

<p class="message">
Best birthday gift ever!  
I can't wait for our date.  
I love you so much ❤️
</p>

</div>

</div>

<script>

const text="Happy Birthday to the most amazing, beautiful, and wonderful person in my life. Every moment with you is a blessing 💖";
let i=0;

function typeWriter(){

if(i<text.length){

document.getElementById("typing-text").innerHTML+=text.charAt(i);
i++;

setTimeout(typeWriter,50);

}else{

document.getElementById("next-btn").style.display="inline-block";

}

}

typeWriter();

function showScreen(id){

document.querySelectorAll(".screen").forEach(screen=>{
screen.classList.remove("active");
});

document.getElementById(id).classList.add("active");

}

const noBtn=document.getElementById("no-btn");
const noGif=document.getElementById("no-gif");

function moveButton(){

const maxX=window.innerWidth-noBtn.offsetWidth-20;
const maxY=window.innerHeight-noBtn.offsetHeight-20;

const randomX=Math.random()*maxX;
const randomY=Math.random()*maxY;

noBtn.style.position="fixed";
noBtn.style.left=randomX+"px";
noBtn.style.top=randomY+"px";

noGif.style.display="block";

}

noBtn.addEventListener("mouseenter",moveButton);

document.getElementById("yes-btn").addEventListener("click",()=>{
showScreen("screen3");
});

const music=document.getElementById("bg-music");
const musicBtn=document.getElementById("music-start-btn");

function tryPlayMusic(){

music.play()
.then(()=>{
musicBtn.style.display="none";
})
.catch(()=>{
musicBtn.style.display="block";
});

}

musicBtn.addEventListener("click",tryPlayMusic);

window.onload=()=>{
musicBtn.style.display="block";
}

</script>

</body>
</html>
